# Build, push, and deploy backend to Cloud Run from Cloud Build trigger.
# NOTE: Trigger this on pushes to `main`.
# Trigger suggestion:
# - Event: Push to branch
# - Branch regex: ^main$
# - Config: cloudbuild.yaml

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/backend/Dockerfile.cloudrun
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

substitutions:
  _REGION: europe-west1
  _REPO: hd-parrainage
  _SERVICE: hd-parrainage-api

options:
  logging: CLOUD_LOGGING_ONLY
