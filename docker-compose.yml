services:
  postgres:
    image: postgres:17
    container_name: hd-parrainage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hd_parrainage_dev}
      POSTGRES_USER: ${POSTGRES_USER:-hd_parrainage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hd_parrainage_local}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hd_parrainage} -d ${POSTGRES_DB:-hd_parrainage_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      
  redis:
    image: redis:8.4-alpine
    container_name: hd-parrainage-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: hd-parrainage-backend
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: "http://localhost:${BACKEND_PORT:-8081}"
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-hd_parrainage_dev}
      DB_USERNAME: ${POSTGRES_USER:-hd_parrainage}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hd_parrainage_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
      SESSION_DOMAIN: ""
      SANCTUM_STATEFUL_DOMAINS: "localhost:${FRONTEND_PORT:-5175},127.0.0.1:${FRONTEND_PORT:-5175},localhost:${BACKEND_PORT:-8081},127.0.0.1:${BACKEND_PORT:-8081}"
      CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_PORT:-5175},http://127.0.0.1:${FRONTEND_PORT:-5175}"
      FRONTEND_URL: "http://localhost:${FRONTEND_PORT:-5175}"
      COMPOSER_ALLOW_SUPERUSER: "1"
    ports:
      - "${BACKEND_PORT:-8081}:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor_runtime:/var/www/html/vendor
    command: ["sh", "/opt/project/docker/backend/start-backend.sh"]

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: hd-parrainage-worker
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-hd_parrainage_dev}
      DB_USERNAME: ${POSTGRES_USER:-hd_parrainage}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hd_parrainage_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
      COMPOSER_ALLOW_SUPERUSER: "1"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor_runtime:/var/www/html/vendor
    command: ["sh", "/opt/project/docker/backend/start-worker.sh"]

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: hd-parrainage-scheduler
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-hd_parrainage_dev}
      DB_USERNAME: ${POSTGRES_USER:-hd_parrainage}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hd_parrainage_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: database
      COMPOSER_ALLOW_SUPERUSER: "1"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor_runtime:/var/www/html/vendor
    command: ["sh", "/opt/project/docker/backend/start-scheduler.sh"]

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: hd-parrainage-frontend
    working_dir: /workspace
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_APP_NAME: "HD Parrainage"
      VITE_APP_ENV: local
      VITE_APP_URL: "http://localhost:${FRONTEND_PORT:-5175}"
      VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8081}/api"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5175}:${FRONTEND_CONTAINER_PORT:-5175}"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    # Always install so named volume node_modules picks up new deps (e.g. after package.json changes).
    command: >
      sh -lc "npm install && npm run dev"

volumes:
  postgres_data:
  redis_data:
  backend_vendor_runtime:
  frontend_node_modules:
